  </style>
</head>

<body>


<div id="chat"></div>

<div id="inputArea">
  <input type="text" id="query" placeholder="Type message..." />
  <button onclick="sendQuery()">Send</button>
</div>

<script>
  let history = JSON.parse(localStorage.getItem("chatHistory")) || [];
async function sendQuery() {
  const input = document.getElementById("query");
  const query = input.value.trim();

  if (!query) return;

  const chat = document.getElementById("chat");

  // user message
  chat.innerHTML += `<div class="user"><div class="bubble">${query}</div></div>`;
  history.push({ role: "user", content: query });
  input.value = "";

  // typing
  chat.innerHTML += `<div class="bot" id="loading"><div class="bubble">Typing...</div></div>`;

  const res = await fetch("https://n8n-7bem.onrender.com/webhook/593b5154-29c5-4a2c-a47b-dfdf59db9e40", {
  method: "POST",
  body: JSON.stringify({
  query: query,
  history: history
})
  });

  const data = await res.text();
 history.push({ role: "assistant", content: data });
localStorage.setItem("chatHistory", JSON.stringify(history));

  document.getElementById("loading").remove();

  // bot reply
  chat.innerHTML += `<div class="bot"><div class="bubble">${data}</div></div>`;

  chat.scrollTop = chat.scrollHeight;
}
document.getElementById("query").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();   // important
    sendQuery();
  }
});
</script>

</body>
